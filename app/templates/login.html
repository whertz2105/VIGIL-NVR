{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="login-wrap">
  <form id="login-form" class="login-card">
    <h1>Admin sign in</h1>
    <p class="login-sub">{{ brand }} · settings</p>
    <label class="login-field">Username
      <input id="login-user" type="text" value="admin" autocomplete="username">
    </label>
    <label class="login-field">Password
      <input id="login-pass" type="password" autocomplete="current-password" required autofocus>
    </label>
    <button type="submit" class="btn primary login-submit">Sign in</button>
    <div id="login-err" class="login-err" hidden></div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/login.js?v={{ static_v }}"></script>
{% endblock %}
